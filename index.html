    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "Hirevo",
      "url": "https://hirevo.nl",

        "@type": "SearchAction",
        "target": "https://hirevo.nl/#/company-browse?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }

      "sameAs": [],

        "@type": "ContactPoint",
        "email": "info@hirevo.nl",
        "contactType": "customer service",
        "availableLanguage": ["English", "Dutch", "Romanian"]
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "name": "Direct Worker Recruitment Platform",
      "provider": {
        "@type": "Organization",
        "name": "Hirevo"
      },
      "serviceType": "Recruitment Marketplace",
      "areaServed": [
        { "@type": "Country", "name": "Netherlands" },
        { "@type": "Country", "name": "Germany" }
      ],
      "description": "B2B platform connecting companies in the Netherlands and Germany directly with verified EU workers in logistics, manufacturing, hospitality, agriculture, and construction. No agency intermediaries.",

        "@type": "Offer",
        "description": "Free worker profiles. Companies browse free, pay only to unlock contact details.",
        "price": "0",

      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does Hirevo work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Workers create a free profile on Hirevo. Companies browse all profiles for free and pay only when they want to unlock a worker's contact details. No agency fees, no per-hire commissions."
          }
        },
        {
          "@type": "Question",
          "name": "Is Hirevo free for workers?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Worker profiles on Hirevo are completely free, forever. Workers are contacted directly by companies without any agency involvement."
          }
        },
        {
          "@type": "Question",
          "name": "Which countries does Hirevo serve?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hirevo connects workers from EU countries (Romania, Poland, Bulgaria, Hungary, Czech Republic, and others) with companies in the Netherlands and Germany."
          }
        },
        {
          "@type": "Question",
          "name": "What sectors does Hirevo cover?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hirevo covers logistics, manufacturing, hospitality, construction, agriculture, and cleaning sectors."
          }
        }
      ]
    }
    </script>
